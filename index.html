<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savoria RMS | Enterprise Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="app">
        <!-- ── Sidebar ── -->
        <aside class="sidebar"
            style="display:none; background:#020617; border-right:1px solid #0f172a; flex-direction:column;">

            <!-- Brand -->
            <div
                style="height:80px; padding:0 2.5rem; display:flex; align-items:center; gap:1rem; border-bottom:1px solid rgba(255,255,255,0.1); background:#020617; flex-shrink:0;">
                <div
                    style="width:36px; height:36px; background:#10b981; border-radius:0.75rem; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                    <span style="font-weight:900; color:#020617; font-size:1.2rem;">S</span>
                </div>
                <h1 style="font-size:1.3rem; font-weight:800; color:white; letter-spacing:-0.03em; margin:0;">Savoria
                </h1>
            </div>

            <!-- Nav -->
            <nav id="main-nav"
                style="flex:1; padding:1.5rem 1rem; display:flex; flex-direction:column; gap:0.35rem; overflow-y:auto;">
                <button class="nav-item active" data-view="dashboard">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-view="tables">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                    </svg>
                    <span>Tables</span>
                </button>
                <button class="nav-item" data-view="menu">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span>Menu</span>
                </button>
                <button class="nav-item" data-view="reservations">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span>Reservations</span>
                </button>
                <button class="nav-item" data-view="kitchen" style="position:relative;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path
                            d="M19 11H5m14 0a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10" />
                    </svg>
                    <span>Kitchen</span>
                    <span id="ready-order-badge" style="display:none; position:absolute; top:6px; right:10px;
                        min-width:18px; height:18px; padding:0 4px; border-radius:999px; background:#ef4444;
                        color:white; font-size:0.65rem; font-weight:900; align-items:center; justify-content:center;
                        box-shadow:0 0 8px rgba(239,68,68,0.7); animation:pulse 1.5s infinite;"></span>
                </button>
                <button class="nav-item" data-view="staff">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 00-3-3.87" />
                        <path d="M16 3.13a4 4 0 010 7.75" />
                    </svg>
                    <span>Staff</span>
                </button>
                <button class="nav-item" data-view="analytics">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M3 3v18h18" />
                        <path d="M18 12l-5-5-4 4-3-3" />
                    </svg>
                    <span>Analytics</span>
                </button>
            </nav>

            <!-- Logout -->
            <div style="padding:0.75rem; border-top:1px solid #0f172a;">
                <button id="logout-btn" class="nav-item" style="color:#f87171; width:100%;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ── Main ── -->
        <main class="content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="search-bar">
                    <h3 id="current-view-title">Dashboard</h3>
                    <span class="enterprise-badge">Enterprise Engine Active</span>
                </div>
                <div class="actions">
                    <div class="live-badge">
                        <div
                            style="width:8px; height:8px; background:#10b981; border-radius:50%; animation:pulse 2s infinite;">
                        </div>
                        <span style="font-size:0.75rem; font-weight:600; color:#f1f5f9;">Live Dashboard</span>
                    </div>
                    <div style="width:1px; height:1.5rem; background:rgba(255,255,255,0.05); margin:0 0.5rem;"></div>
                    <div id="live-clock"
                        style="font-size:0.8rem; font-weight:700; color:#94a3b8; font-family:'Outfit',monospace; letter-spacing:0.05em;">
                        --:--:--</div>
                    <div style="width:1px; height:1.5rem; background:rgba(255,255,255,0.05); margin:0 0.5rem;"></div>
                    <div id="user-display-pill" class="user-pill">
                        <div class="user-info">
                            <div class="label">Operating as</div>
                            <div id="user-role-label" class="role">—</div>
                        </div>
                        <div id="user-avatar" class="avatar">—</div>
                    </div>
                </div>
            </header>
            <div id="view-container">
                <!-- Views injected here -->
            </div>
        </main>
    </div>
    <script type="module" src="/main.js"></script>
</body>

</html>
